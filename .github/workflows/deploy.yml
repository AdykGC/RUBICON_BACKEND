# .github/workflows/deploy.yml

name: Deploy

on:
  push:
    branches: [ "main" ]

env:
  DOCKER_IMAGE: adilkhan097/rubicon-backend
  DOCKER_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Laravel image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: _Docker/Laravel/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/RUBICON_BACKEND

            echo "== Pull latest code =="
            git fetch origin
            git reset --hard origin/main

            echo "== Log in to Docker Hub =="
            echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            echo "== Remove old image to force fresh pull =="
            docker rmi ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} || true

            echo "== Pull fresh image =="
            docker compose pull laravel_php

            echo "== Recreate containers =="
            docker compose up -d --remove-orphans

            echo "== Cleanup old images =="
            docker image prune -f --filter "until=24h"